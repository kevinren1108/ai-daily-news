name: Daily News

on:
  schedule:
    # 每 6 小时一次（一天 4 次）：UTC 0/6/12/18 点。GitHub 定时有几分钟~几十分钟延迟，属正常。
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # 允许在 Actions 页面手动点一下立即跑

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个，避免重复部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install deps
        run: pip install feedparser deep-translator

      # 跨次运行保留滚动存档（48h 窗口 + 翻译缓存）。restore-keys 取最近一次。
      - name: Restore rolling store
        uses: actions/cache/restore@v4
        with:
          path: data/store.json
          key: store-${{ github.run_id }}
          restore-keys: |
            store-

      - name: Build site
        run: python build.py
        env:
          # 用 Max 订阅的长期 OAuth token（claude setup-token 生成）。不要设 ANTHROPIC_API_KEY，否则会抢占。
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Save rolling store
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/store.json
          key: store-${{ github.run_id }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
